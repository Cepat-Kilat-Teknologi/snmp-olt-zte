          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: >-
        API key for /api/v1 routes. With a single `API_KEY` the key only gates
        access. With the per-tenant `API_USERS` registry, the key also identifies
        the caller (user_id + role): a user sees only the OLTs whose `user_id`
        matches theirs — requesting another tenant's OLT returns 404 (not 403, to
        avoid enumeration) — while an `admin` role sees all OLTs. A missing or
        unknown key returns 401 when authentication is enabled.

  parameters:
    OltId:
      name: olt_id
      in: path
      required: true
      description: >-
        Selects the target OLT in a multi-OLT deployment (the `OLTS` / `OLTS_FILE`
        registry). Must match the `id` of one configured OLT. Present only on the
        `/api/v1/olt/{olt_id}/...` paths; the configured default OLT additionally
        answers the bare `/api/v1/board/...` paths. An unknown id returns 404.
      schema:
        type: string
        pattern: "^[A-Za-z0-9_-]+$"
        example: c320
    BoardId:
      name: board_id
      in: path
      required: true
      description: >-
        Physical GPON slot on the OLT (board). Which slots are valid depends on
        the deployment's OLT_BOARDS setting: a ZTE C320 typically uses slots 1-2,
        while a C300 chassis holds its GPON cards in higher slots (e.g. 3 and 5).
        Requests for a slot not configured via OLT_BOARDS return 400.
      schema:
        type: integer
        minimum: 1
        maximum: 30
        example: 1
    PonId:
      name: pon_id
      in: path
      required: true
      description: PON port identifier on the board
      schema:
        type: integer
        minimum: 1
        maximum: 16
        example: 1
    OnuId:
      name: onu_id
      in: path
      required: true
      description: ONU identifier on the PON port
      schema:
        type: integer
        minimum: 1
        maximum: 128
        example: 1
    NoCache:
      name: nocache
      in: query
      required: false
      description: >-
        When `true`, force a fresh SNMP read, bypassing the serial-list Redis
        cache (`board_<b>_pon_<p>_serial_list`) and refreshing it with the result.
        Used by write-olt-zte's pre-write existence checks so a delete/replace
        issued right after a provision sees the OLT's real state instead of a
        stale cached snapshot. Any value other than `true` keeps the default
        cached behaviour.
      schema:
        type: boolean
        default: false
        example: true

  schemas:
    WebResponse:
      type: object
      description: Standard success response wrapper
      properties:
        code:
          type: integer
          description: HTTP status code
          example: 200
        status:
          type: string
          description: Fixed string "success" for 2xx responses (ISP adapter standard)
          example: success
        data: {}
      required:
        - code
        - status
        - data

    ErrorResponse:
      type: object
      description: |
        Standard error response wrapper aligned to the `isp-adapter-standard`
        wiki page. `error_code` is a machine-readable identifier, `data`
        carries either the error message (string) or a structured object with
        `message` + `details`, and `request_id` echoes the request correlation
        ID so operators can correlate across services.
      properties:
        code:
          type: integer
          description: HTTP status code
          example: 400
        status:
          type: string
          description: HTTP reason phrase (e.g. "Bad Request", "Not Found")
          example: Bad Request
        error_code:
          type: string
          description: Machine-readable error code
          enum:
            - VALIDATION_ERROR
            - NOT_FOUND
            - UNAUTHORIZED
            - SNMP_ERROR
            - REDIS_ERROR
            - CONFIG_ERROR
            - INTERNAL_ERROR
          example: VALIDATION_ERROR
        data:
          description: |
            Either the human-readable error message (string) or an object
            containing `message` + `details` when structured context is
            available. Callers should handle both shapes.
          oneOf:
            - type: string
              example: board_id is not a configured GPON slot
            - type: object
              properties:
                message:
                  type: string
                  example: board_id is not a configured GPON slot
                details:
                  type: object
                  additionalProperties: true
                  example:
                    received: "99"
        request_id:
          type: string
          description: Correlation ID (same value as X-Request-ID response header)
          example: d7dhp4pciod1cuth4i80
      required:
        - code
        - status
        - error_code
        - data

    Meta:
      type: object
      description: Pagination metadata
      properties:
        page:
          type: integer
          description: Current page number
          example: 1
        limit:
          type: integer
          description: Items per page
          example: 10
        page_count:
          type: integer
          description: Total number of pages
          example: 7
        total_rows:
          type: integer
          description: Total number of records
          example: 69
      required:
        - page
        - limit
        - page_count
        - total_rows

    ONUInfoPerBoard:
      type: object
      description: Summary information for an ONU on a board/PON combination
      properties:
        board:
          type: integer
          description: Board number
          example: 1
        pon:
          type: integer
          description: PON port number
          example: 1
        onu_id:
          type: integer
          description: ONU identifier
          example: 1
        name:
          type: string
          description: Customer or ONU name
          example: Customer-001
        onu_type:
          type: string
          description: ONU hardware model
          example: F670LV7.1
        serial_number:
          type: string
          description: ONU serial number
          example: ZTEGC12345678
        rx_power:
          type: string
          description: Received optical power in dBm
          example: "-22.22"
        status:
          type: string
          description: Current ONU status
          enum:
            - Online
            - Offline
            - LOS
            - DyingGasp
          example: Online
      required:
        - board
        - pon
        - onu_id
        - name
        - onu_type
        - serial_number
        - rx_power
        - status

    ONUCustomerInfo:
      type: object
      description: Detailed information for a specific ONU including optical levels and uptime history
      properties:
        board:
          type: integer
          example: 1
        pon:
          type: integer
          example: 1
        onu_id:
          type: integer
          example: 1
        name:
          type: string
          description: Customer or ONU name
          example: Customer-001
        description:
          type: string
          description: ONU location or description
          example: Location
        onu_type:
          type: string
          description: ONU hardware model
          example: F670LV7.1
        serial_number:
          type: string
          description: ONU serial number
          example: ZTEGC12345678
        rx_power:
          type: string
          description: Received optical power in dBm
          example: "-22.22"
        tx_power:
          type: string
          description: Transmitted optical power in dBm
          example: "2.57"
        status:
          type: string
          description: Current ONU status
          enum:
            - Online
            - Offline
            - LOS
            - DyingGasp
          example: Online
        ip_address:
          type: string
          description: ONU management IP address
          example: 10.0.0.1
        last_online:
          type: string
          description: Timestamp of last online event
          example: "2024-08-11 10:09:37"
        last_offline:
          type: string
          description: Timestamp of last offline event
          example: "2024-08-11 10:08:35"
        uptime:
          type: string
          description: Current uptime duration
          example: 5 days 13 hours 10 minutes 50 seconds
        last_down_time_duration:
          type: string
          description: Duration of the last downtime event
          example: 0 days 0 hours 1 minutes 2 seconds
        offline_reason:
          type: string
          description: Reason for the last offline event
          example: PowerOff
        gpon_optical_distance:
          type: string
          description: GPON optical distance in meters
          example: "6701"
      required:
        - board
        - pon
        - onu_id
        - name
        - description
        - onu_type
        - serial_number
        - rx_power
        - tx_power
        - status
        - ip_address
        - last_online
        - last_offline
        - uptime
        - last_down_time_duration
        - offline_reason
        - gpon_optical_distance

    OnuID:
      type: object
      description: An available/empty ONU ID slot
      properties:
        board:
          type: integer
          example: 1
        pon:
          type: integer
          example: 1
        onu_id:
          type: integer
          example: 123
      required:
        - board
        - pon
        - onu_id

    OnuSerialNumber:
      type: object
      description: ONU ID paired with its serial number
      properties:
        board:
          type: integer
          example: 1
        pon:
          type: integer
          example: 1
        onu_id:
          type: integer
          example: 1
        serial_number:
          type: string
          example: ZTEGC12345678
      required:
        - board
        - pon
        - onu_id
        - serial_number

    TrapEvent:
      type: object
      description: Webhook payload sent when ONU offline event is detected via SNMP Trap
      properties:
        timestamp:
          type: string
          format: date-time
          example: "2026-04-07T10:30:45+07:00"
        source:
          type: string
          description: IP address of the OLT that sent the trap
          example: "192.0.2.10"
        board:
          type: integer
          example: 1
        pon:
          type: integer
          example: 5
        onu_id:
          type: integer
          example: 23
        event_type:
          type: string
          enum: [LOS, DyingGasp, PowerOff, Offline, AuthFailed, LOSi, LOFi]
          example: LOS
        status:
          type: string
          enum: [offline, online, logging, syncing, unknown]
          example: offline
        name:
          type: string
          description: ONU customer name
          example: "Customer-023"
        description:
          type: string
          description: ONU location/address
          example: "Perumahan Graha Ria Blok F No.6"
        onu_type:
          type: string
          example: "F670LV7.1"
        serial_number:
          type: string
          example: "ZTEGC12345678"
      required:
        - timestamp
        - source
        - board
        - pon
        - onu_id
        - event_type
        - status

  responses:
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: 400
            status: Bad Request
            error_code: VALIDATION_ERROR
            data:
              message: board_id is not a configured GPON slot
              details:
                received: "99"
            request_id: d7dhp4pciod1cuth4i80
    Unauthorized:
      description: Missing or invalid API key
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: 401
            status: Unauthorized
            error_code: UNAUTHORIZED
            data: invalid or missing API key
            request_id: d7dhp4pciod1cuth4i80
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: 404
            status: Not Found
            error_code: NOT_FOUND
            data:
              message: ONU not found
              details:
                board_id: 1
                pon_id: 8
                onu_id: 42
            request_id: d7dhp4pciod1cuth4i80
    RateLimited:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: 429
            status: Too Many Requests
            error_code: INTERNAL_ERROR
            data: Rate limit exceeded, try again later
            request_id: d7dhp4pciod1cuth4i80
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: 500
            status: Internal Server Error
            error_code: INTERNAL_ERROR
            data: An unexpected error occurred
            request_id: d7dhp4pciod1cuth4i80

tags:
  - name: Health
    description: Server health check
  - name: ONU
    description: ONU monitoring and detail endpoints
  - name: ONU ID
    description: ONU ID listing and serial number lookup
  - name: Cache
    description: Cache management operations
