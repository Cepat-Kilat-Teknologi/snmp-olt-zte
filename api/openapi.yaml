      parameters:
        - $ref: "#/components/parameters/OltId"
        - $ref: "#/components/parameters/BoardId"
        - $ref: "#/components/parameters/PonId"
        - name: page
          in: query
          description: Page number (1-indexed)
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
            example: 1
        - name: limit
          in: query
          description: Number of items per page
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
            example: 10
      responses:
        "200":
          description: Paginated list of ONUs retrieved successfully
          content:
            application/json:
              schema:
                allOf:
