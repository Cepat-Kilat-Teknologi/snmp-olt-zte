openapi: 3.1.0
info:
  title: Go SNMP OLT ZTE C320 Monitoring API
  description: |
    REST API for monitoring ZTE C320 and C300 OLT (Optical Line Terminal) via SNMP.
    Provides endpoints to query ONU status, optical power levels, serial numbers,
    and manage cache for board/PON combinations.

    **Multi-OLT:** when the instance is configured with multiple OLTs (the `OLTS`
    env var), every `/api/v1/board/...` path below is also available under
    `/api/v1/olt/{olt_id}/board/...`, where `{olt_id}` selects the target OLT.
    The configured default OLT continues to answer the bare `/api/v1/board/...`
    paths shown here. `board_id` is the physical GPON slot and `pon_id` is
    validated against that slot's card (GTGO=8 or GTGH=16 PON ports).

    **Breaking change in 3.0.0:** the JSON response format was aligned to
    the ISP adapter standard:
      - success responses now use `status: "success"` (was `"OK"`)
      - error responses use top-level `error_code` (was nested `error.type`)
      - error body carries `data` (was nested `error.message`) and `request_id`

    API contract version is `v1` (endpoint prefix `/api/v1`). The binary
    version and contract version are exposed via `X-App-Version` and
    `X-API-Version` response headers on every request.
  version: 3.2.0
  contact:
    name: API Support
  license:
    name: MIT
    identifier: MIT

servers:
  - url: http://localhost:8081
    description: Local development server

security:
  - ApiKeyAuth: []

paths:
  /health:
    get:
      summary: Liveness probe (legacy alias)
      description: |
        Returns the liveness status of the service. Kept for backwards
        compatibility; new deployments should prefer `/healthz`.
      operationId: healthCheck
      tags:
        - Health
      security: []
      responses:
        "200":
          description: Server is alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy
                required:
                  - status

  /healthz:
    get:
      summary: Liveness probe
      description: |
        Kubernetes-style liveness probe. Always returns 200 OK when the
        process is running; does not inspect dependencies. Use `/readyz`
        for readiness gating.
      operationId: livenessProbe
      tags:
        - Health
      security: []
      responses:
        "200":
          description: Server is alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy

  /readyz:
    get:
      summary: Readiness probe with dependency checks
      description: |
        Returns 200 when all registered dependency probes (Redis, SNMP) are
        healthy, 503 otherwise. Probe results are cached per-dependency TTL
        (Redis 5s, SNMP 30s) so this endpoint is cheap to call.

        In multi-OLT deployments each OLT gets its own probe keyed `snmp_<id>`
        (e.g. `snmp_c320`, `snmp_c300a`). The default OLT is critical; secondary
        OLTs are non-critical, so one unreachable secondary degrades the report
        but does not flip readiness to 503.
      operationId: readinessProbe
      tags:
        - Health
      security: []
      responses:
        "200":
          description: Service is ready to serve traffic
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ready
                  dependencies:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        state:
                          type: string
                          enum: [up, down]
                        error:
                          type: string
                    example:
                      redis:
                        state: up
                      snmp_c320:
                        state: up
                      snmp_c300a:
                        state: up
        "503":
          description: One or more dependencies are down
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: not_ready
                  dependencies:
                    type: object

  /version:
    get:
      summary: Build metadata
      description: |
        Returns JSON build metadata (version, API contract version, git
        commit, build time, uptime). Useful for release verification and
        Grafana/Kibana panels. Unauthenticated — the same data is visible
        in Docker image labels.
      operationId: versionInfo
      tags:
        - Health
      security: []
      responses:
        "200":
          description: Build metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    type: string
                    description: Binary semantic version
                    example: "3.0.0"
                  api_version:
                    type: string
                    description: API contract version prefix
                    example: "v1"
                  commit:
                    type: string
                    description: Git commit SHA at build time
                    example: "abcd123"
                  build_time:
                    type: string
                    description: Build timestamp (RFC3339)
                    example: "2026-04-12T10:00:00Z"
                  uptime:
                    type: string
                    description: Process uptime
                    example: "48h30m0s"

  /metrics:
    get:
      summary: Prometheus metrics
      description: |
        OpenMetrics / Prometheus exposition endpoint. Unauthenticated —
        scrapers are expected to run on the same private network. Returns
        HTTP request metrics, SNMP operation counters/histograms, and
        cache hit/miss counters.
      operationId: metricsEndpoint
      tags:
        - Health
      security: []
      responses:
        "200":
          description: Prometheus text-format metrics
          content:
            text/plain:
              schema:
                type: string

  /api/v1/board/{board_id}/pon/{pon_id}:
    get:
      summary: Get all ONUs for a board/PON combination
      description: Retrieves a list of all ONUs connected to the specified board and PON port.
      operationId: getOnusByBoardPon
      tags:
        - ONU
      parameters:
        - $ref: "#/components/parameters/BoardId"
        - $ref: "#/components/parameters/PonId"
      responses:
        "200":
          description: List of ONUs retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/WebResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/ONUInfoPerBoard"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/board/{board_id}/pon/{pon_id}/cache/clear:
    delete:
      summary: Clear cache for a board/PON combination
      description: Removes the cached ONU data for the specified board and PON port. The next request will fetch fresh data from SNMP.
      operationId: clearCacheByBoardPon
      tags:
        - Cache
      parameters:
        - $ref: "#/components/parameters/BoardId"
        - $ref: "#/components/parameters/PonId"
      responses:
        "200":
          description: Cache cleared successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/WebResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          message:
                            type: string
                            example: Cache deleted successfully
                          board_id:
                            type: integer
                            example: 1
                          pon_id:
                            type: integer
                            example: 1
                        required:
                          - message
                          - board_id
                          - pon_id
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/board/{board_id}/pon/{pon_id}/onu/{onu_id}:
    get:
      summary: Get specific ONU detail
      description: Retrieves detailed information for a specific ONU including optical power levels, uptime, and offline history.
      operationId: getOnuDetail
      tags:
        - ONU
      parameters:
        - $ref: "#/components/parameters/BoardId"
        - $ref: "#/components/parameters/PonId"
        - $ref: "#/components/parameters/OnuId"
      responses:
        "200":
          description: ONU detail retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/WebResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ONUCustomerInfo"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/board/{board_id}/pon/{pon_id}/onu_id/empty:
    get:
      summary: Get available/empty ONU IDs
      description: Returns a list of ONU IDs that are not currently assigned on the specified board and PON port.
      operationId: getEmptyOnuIds
      tags:
        - ONU ID
      parameters:
        - $ref: "#/components/parameters/BoardId"
        - $ref: "#/components/parameters/PonId"
      responses:
        "200":
          description: List of empty ONU IDs retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/WebResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/OnuID"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/board/{board_id}/pon/{pon_id}/onu_id_sn:
    get:
      summary: Get ONU IDs with serial numbers
      description: Returns a list of ONU IDs along with their corresponding serial numbers for the specified board and PON port.
      operationId: getOnuIdSerialNumbers
      tags:
        - ONU ID
      parameters:
        - $ref: "#/components/parameters/BoardId"
        - $ref: "#/components/parameters/PonId"
        - $ref: "#/components/parameters/NoCache"
      responses:
        "200":
          description: ONU IDs with serial numbers retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/WebResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/OnuSerialNumber"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/board/{board_id}/pon/{pon_id}/onu_id/update:
    post:
      summary: Force refresh empty ONU ID cache
      description: Triggers a cache refresh for empty ONU IDs on the specified board and PON port.
      operationId: updateEmptyOnuIdCache
      tags:
        - Cache
      parameters:
        - $ref: "#/components/parameters/BoardId"
        - $ref: "#/components/parameters/PonId"
      responses:
        "200":
          description: Cache updated successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/WebResponse"
                  - type: object
                    properties:
                      data:
                        type: string
                        example: Success Update Empty ONU_ID
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/paginate/board/{board_id}/pon/{pon_id}:
    get:
      summary: Get paginated ONU list
      description: Retrieves a paginated list of ONUs for the specified board and PON port with metadata about total rows and page count.
      operationId: getOnusPaginated
      tags:
        - ONU
      parameters:
        - $ref: "#/components/parameters/BoardId"
        - $ref: "#/components/parameters/PonId"
        - name: page
          in: query
          description: Page number (1-indexed)
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
            example: 1
        - name: limit
          in: query
          description: Number of items per page
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
            example: 10
      responses:
        "200":
          description: Paginated list of ONUs retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/WebResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/ONUInfoPerBoard"
                      meta:
                        $ref: "#/components/schemas/Meta"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  # ───────────────────────────────────────────────────────────────────────────
  # Multi-OLT variants. Identical semantics to the bare /api/v1/board/... paths
  # above, but {olt_id} selects which OLT in the OLTS/OLTS_FILE registry to
  # target. The configured DEFAULT_OLT also answers the bare paths above.
  # ───────────────────────────────────────────────────────────────────────────
  /api/v1/olt/{olt_id}/board/{board_id}/pon/{pon_id}:
    get:
      summary: Get all ONUs for a board/PON (multi-OLT)
      description: Same as the bare path but scoped to the OLT named by `olt_id`.
      operationId: getOnusByBoardPonForOlt
      tags:
        - ONU
      parameters:
        - $ref: "#/components/parameters/OltId"
        - $ref: "#/components/parameters/BoardId"
        - $ref: "#/components/parameters/PonId"
      responses:
        "200":
          description: List of ONUs retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/WebResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/ONUInfoPerBoard"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/olt/{olt_id}/board/{board_id}/pon/{pon_id}/cache/clear:
    delete:
      summary: Clear cache for a board/PON (multi-OLT)
      description: Same as the bare path but scoped to the OLT named by `olt_id`.
      operationId: clearCacheByBoardPonForOlt
      tags:
        - Cache
      parameters:
        - $ref: "#/components/parameters/OltId"
        - $ref: "#/components/parameters/BoardId"
        - $ref: "#/components/parameters/PonId"
      responses:
        "200":
          description: Cache cleared successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/WebResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          message:
                            type: string
                            example: Cache deleted successfully
                          board_id:
                            type: integer
                            example: 1
                          pon_id:
                            type: integer
                            example: 1
                        required:
                          - message
                          - board_id
                          - pon_id
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/olt/{olt_id}/board/{board_id}/pon/{pon_id}/onu/{onu_id}:
    get:
      summary: Get specific ONU detail (multi-OLT)
      description: Same as the bare path but scoped to the OLT named by `olt_id`.
      operationId: getOnuDetailForOlt
      tags:
