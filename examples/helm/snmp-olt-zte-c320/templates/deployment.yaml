apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "snmp-olt-zte-c320.fullname" . }}
  labels:
    {{- include "snmp-olt-zte-c320.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "snmp-olt-zte-c320.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
      labels:
        {{- include "snmp-olt-zte-c320.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
            {{- if .Values.trap.enabled }}
            - name: trap-udp
              containerPort: {{ .Values.trap.port }}
              protocol: UDP
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "snmp-olt-zte-c320.fullname" . }}
          env:
            - name: SNMP_COMMUNITY
              valueFrom:
                secretKeyRef:
                  name: {{ include "snmp-olt-zte-c320.fullname" . }}
                  key: SNMP_COMMUNITY
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "snmp-olt-zte-c320.fullname" . }}
                  key: REDIS_PASSWORD
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "snmp-olt-zte-c320.fullname" . }}
                  key: API_KEY
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
