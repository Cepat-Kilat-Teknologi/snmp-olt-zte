apiVersion: v1
kind: Service
metadata:
  name: {{ include "snmp-olt-zte-c320.fullname" . }}
  labels:
    {{- include "snmp-olt-zte-c320.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    {{- if .Values.trap.enabled }}
    - port: {{ .Values.trap.port }}
      targetPort: trap-udp
      protocol: UDP
      name: trap-udp
    {{- end }}
  selector:
    {{- include "snmp-olt-zte-c320.selectorLabels" . | nindent 4 }}
