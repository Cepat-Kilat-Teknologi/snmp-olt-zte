apiVersion: v1
kind: Service
metadata:
  name: {{ include "snmp-olt-zte.fullname" . }}
  labels:
    {{- include "snmp-olt-zte.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  {{- if and (eq .Values.service.type "LoadBalancer") .Values.service.loadBalancerIP }}
  loadBalancerIP: {{ .Values.service.loadBalancerIP }}
  {{- end }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    {{- if .Values.trap.enabled }}
    - port: {{ .Values.trap.port }}
      targetPort: trap-udp
      protocol: UDP
      name: trap-udp
    {{- end }}
  selector:
    {{- include "snmp-olt-zte.selectorLabels" . | nindent 4 }}
