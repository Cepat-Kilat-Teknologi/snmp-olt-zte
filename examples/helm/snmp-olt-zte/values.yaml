# -- Number of replicas for the deployment
replicaCount: 1

image:
  # -- Docker image repository
  repository: cepatkilatteknologi/snmp-olt-zte
  # -- Image pull policy
  pullPolicy: IfNotPresent
  # -- Image tag (defaults to appVersion from Chart.yaml)
  tag: ""

# -- Image pull secrets for private registries
imagePullSecrets: []

# -- Override the release name
nameOverride: ""
# -- Override the full release name
fullnameOverride: ""

service:
  # -- Kubernetes service type
  type: ClusterIP
  # -- HTTP API port
  port: 8081

ingress:
  # -- Enable ingress resource
  enabled: false
  # -- Ingress class name
  className: "nginx"
  # -- Ingress annotations
  annotations: {}
    # nginx.ingress.kubernetes.io/rewrite-target: /
    # nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: snmp-olt.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: snmp-olt-tls
  #    hosts:
  #      - snmp-olt.example.com

resources:
  requests:
    memory: "256Mi"
    cpu: "250m"
  limits:
    memory: "1Gi"
    cpu: "1000m"

# -- SNMP connection settings
snmp:
  # -- OLT IP address or hostname (required)
  host: ""
  # -- SNMP port
  port: 161
  # -- SNMP community string (stored in Secret)
  community: ""
  # -- Maximum concurrent SNMP operations
  maxConcurrent: 5

# -- OLT slot/PON topology (multi-model: C320 + C300)
# The OID encoding is identical for C320 and C300 — only the populated GPON
# slots/cards differ. boards supports per-slot PON counts as "slot:pons"
# (GTGO=8, GTGH=16):
#   ZTE C320 -> "1,2" (default)   |   ZTE C300 (sample) -> "3:16,5:8"
olt:
  # -- Physical GPON slots, optionally "slot:pons" (maps to OLT_BOARDS)
  boards: "1,2"
  # -- Default PON count for bare slots: 8 (GTGO) or 16 (GTGH) (maps to OLT_PONS_PER_BOARD)
  ponsPerBoard: 16
  # -- Multi-OLT in one instance: raw JSON array (maps to OLTS). When set it
  #    overrides snmp.host + olt.boards. Empty = single-OLT mode.
  #    e.g. '[{"id":"c320","host":"10.0.0.1","community":"public","boards":"1,2"},
  #          {"id":"c300a","host":"10.0.0.2","port":1161,"community":"public","boards":"3:16,5:8"}]'
  olts: ""
  # -- Multi-OLT via file (preferred for many OLTs): JSON array content rendered
  #    into a Secret (it holds community strings) and mounted at /etc/olt/olts.json,
  #    with OLTS_FILE pointed at it. Takes effect only when olt.olts is empty.
  #    Same shape as olt.olts. Loading is fail-fast: a set-but-unreadable/empty
  #    file aborts startup rather than silently using SNMP_*.
  oltsFile: ""
  # -- Default OLT id served on the bare /board paths (maps to DEFAULT_OLT)
  defaultOlt: ""

# -- Redis connection settings
# When redis.enabled=true, host is auto-configured to the subchart service.
# When redis.enabled=false, set redis.host to your external Redis.
redis:
  # -- Deploy Redis as a subchart (Bitnami)
  enabled: true
  # -- Redis architecture (subchart)
  architecture: standalone
  auth:
    # -- Enable Redis authentication (subchart)
    enabled: true
    # -- Redis password (used by both subchart and app)
    password: "changeme"
  master:
    persistence:
      # -- Enable Redis data persistence (subchart)
      enabled: true
      # -- PVC size for Redis data (subchart)
      size: 1Gi
  # -- Redis host (only used when redis.enabled=false for external Redis)
  host: ""
  # -- Redis port
  port: "6379"
  # -- Redis database index
  db: 0
  # -- Connection pool size
  poolSize: 100
  # -- Minimum idle connections
  minIdleConnections: 10
  # -- Pool timeout in seconds
  poolTimeout: 240

# -- Cache TTL configuration
cache:
  # -- ONU info cache TTL in seconds (default 30 min)
  onuInfoTTL: 1800
  # -- ONU detail cache TTL in seconds (default 15 min)
  onuDetailTTL: 900
  # -- Empty ONU ID cache TTL in seconds (default 5 min)
  emptyOnuIDTTL: 300
  # -- Enable cache pre-warming on startup
  preWarm: true

# -- TLS configuration
tls:
  # -- Enable TLS/HTTPS
  enabled: false
  # -- Path to TLS certificate file
  certFile: /certs/cert.pem
  # -- Path to TLS key file
  keyFile: /certs/key.pem

# -- CORS settings
cors:
  # -- Comma-separated allowed origins
  allowedOrigins: "https://*,http://*"
  # -- Comma-separated allowed HTTP methods
  allowedMethods: "GET,POST,PUT,DELETE,OPTIONS"
  # -- Comma-separated allowed headers
  allowedHeaders: "Accept,Authorization,Content-Type,X-API-Key,X-Request-ID"
  # -- Allow credentials
  allowCredentials: false
  # -- Preflight cache max age in seconds
  maxAge: 300

# -- API authentication
auth:
  # -- API key for X-API-Key header authentication (stored in Secret)
  apiKey: ""
  # -- Per-tenant API_USERS registry (JSON array of {user_id,api_key,role});
  #    overrides apiKey when set. Holds API keys, so it is stored in the Secret.
  #    Pair with per-OLT "user_id" in olt.olts/olt.oltsFile so each user only
  #    sees their own OLTs (cross-tenant -> 404; role "admin" sees all).
  #    e.g. '[{"user_id":1,"api_key":"keyA"},{"user_id":0,"api_key":"adm","role":"admin"}]'
  apiUsers: ""

# -- SNMP Trap listener settings
trap:
  # -- Enable SNMP trap listener
  enabled: false
  # -- UDP port for trap listener
  port: 1620
  # -- Trap community string (defaults to snmp.community)
  community: ""
  # -- Webhook URL for trap notifications (stored in Secret; ignored if existingSecret set)
  webhookURL: ""
  # -- Reference an existing Secret instead of creating one from webhookURL
  existingSecret: ""
  # -- Key inside existingSecret that holds the webhook URL
  existingSecretKey: "TRAP_WEBHOOK_URL"
  # -- Webhook platform: discord|slack|telegram|generic. Empty = auto-detect from URL.
  webhookType: ""
  # -- Telegram chat ID (required when webhookType=telegram)
  webhookChatID: ""
  # -- Number of webhook delivery retries
  webhookRetries: 3
  # -- Webhook request timeout in seconds
  webhookTimeout: 10
  # -- Per-severity batching and repeat behavior
  # interval: batch window seconds; repeat: re-notify interval in minutes (0=off); action: instruction text
  severity:
    critical:
      interval: 60
      repeat: 3
      action: ""
    high:
      interval: 60
      repeat: 3
      action: ""
    medium:
      interval: 60
      repeat: 0
      action: ""
    low:
      interval: 60
      repeat: 0
      action: ""

# -- RX Power monitor settings
powerMonitor:
  # -- Enable RX power monitoring
  enabled: false
  # -- Monitoring interval in seconds
  interval: 300
  # -- Cron expression for scheduled monitoring (e.g. "0 8,12,15,17,0 * * *")
  cron: ""
  # -- IANA timezone for cron schedule (e.g. "Asia/Jakarta")
  timezone: ""
  # -- High RX power threshold in dBm (overload alert)
  rxPowerHighThreshold: -8.0
  # -- Low RX power threshold in dBm (weak signal alert)
  rxPowerLowThreshold: -25.0

# -- Health check endpoint path
healthcheck:
  path: /health

# -- Liveness probe configuration
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

# -- Readiness probe configuration
readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

# -- Node selector for pod scheduling
nodeSelector: {}

# -- Tolerations for pod scheduling
tolerations: []

# -- Affinity rules for pod scheduling
affinity: {}
