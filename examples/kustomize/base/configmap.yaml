apiVersion: v1
kind: ConfigMap
metadata:
  name: olt-config
  namespace: olt-monitoring
  labels:
    app.kubernetes.io/name: snmp-olt-zte-c320
    app.kubernetes.io/component: config
data:
  # Application
  APP_ENV: "staging"
  SERVER_PORT: "8081"
  TZ: "Asia/Jakarta"

  # SNMP Configuration
  SNMP_HOST: "<your-olt-ip>"
  SNMP_PORT: "161"
  SNMP_MAX_CONCURRENT: "10"

  # Redis Configuration
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  REDIS_MIN_IDLE_CONNECTIONS: "5"
  REDIS_POOL_SIZE: "20"
  REDIS_POOL_TIMEOUT: "5"
  REDIS_ONU_INFO_TTL: "300"
  REDIS_ONU_DETAIL_TTL: "300"
  REDIS_EMPTY_ONU_ID_TTL: "60"

  # Cache
  CACHE_PREWARM: "false"

  # TLS
  USE_TLS: "false"

  # CORS Configuration
  CORS_ALLOWED_ORIGINS: "*"
  CORS_ALLOWED_METHODS: "GET,POST,PUT,DELETE,OPTIONS"
  CORS_ALLOWED_HEADERS: "Content-Type,Authorization,X-API-Key"
  CORS_ALLOW_CREDENTIALS: "true"
  CORS_MAX_AGE: "3600"

  # SNMP Trap Configuration
  TRAP_ENABLED: "true"
  TRAP_PORT: "1620"
  TRAP_WEBHOOK_URL: "<your-webhook-url>"
  TRAP_WEBHOOK_RETRIES: "3"
  TRAP_WEBHOOK_TIMEOUT: "10"

  # Power Monitor Configuration
  POWER_MONITOR_ENABLED: "true"
  POWER_MONITOR_INTERVAL: "300"
  POWER_MONITOR_CRON: "*/5 * * * *"
  POWER_MONITOR_TIMEZONE: "Asia/Jakarta"
  RX_POWER_HIGH_THRESHOLD: "-8.0"
  RX_POWER_LOW_THRESHOLD: "-27.0"
