apiVersion: apps/v1
kind: Deployment
metadata:
  name: snmp-olt-zte
  namespace: olt-monitoring
  labels:
    app.kubernetes.io/name: snmp-olt-zte
    app.kubernetes.io/version: "2.1.0"
    app.kubernetes.io/component: api-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: snmp-olt-zte
  template:
    metadata:
      labels:
        app.kubernetes.io/name: snmp-olt-zte
        app.kubernetes.io/version: "2.1.0"
        app.kubernetes.io/component: api-server
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: snmp-olt-zte
          image: cepatkilatteknologi/snmp-olt-zte:2.1.1
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
            - name: trap-udp
              containerPort: 1620
              protocol: UDP
          envFrom:
            - configMapRef:
                name: olt-config
            - secretRef:
                name: olt-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
